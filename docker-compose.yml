services:
  web:
    image: ghcr.io/lamacheref/openindex_v2-web:latest
    ports:
      - "3000:3000"
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: openindex
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    depends_on:
      - db

  db:
    image: postgres:17
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: openindex
    volumes:
      - postgres_data:/var/lib/postgresql/data

  crawler:
    image: ghcr.io/lamacheref/openindex_v2-crawler:latest
    entrypoint: ["python"]
    command: ["src/smb_crawler_postgresql.py"]
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: openindex
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    depends_on:
      - db

volumes:
  postgres_data:
