name: Docker Build and Push

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4  # v2 → v4 (actuel)

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3  # Multi-arch support

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3  # v1 → v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}  # Convention majuscules
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v6  # v2 → v6 (actuel 2026)
      with:
        context: .
        platforms: linux/amd64,linux/arm64  # Multi-arch pour tes serveurs
        push: ${{ github.event_name != 'pull_request' }}  # Push seulement sur push main
        tags: |
          lamacheref/openindexv2:latest
          lamacheref/openindexv2:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Verify image
      run: |
        docker run --rm lamacheref/openindexv2:latest echo "Build successful"
