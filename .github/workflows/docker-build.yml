name: Docker Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # SUPPRIME Docker Hub login (inutile)

    - name: Build image
      id: build
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: false  # Build local seulement
        tags: |
          lamacheref/openindexv2:local
          lamacheref/openindexv2:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        outputs: type=image,name=image_id,push=false  # Garde image en mémoire

    - name: Verify image
      run: |
        docker run --rm ${{ steps.build.outputs.image_id }} echo "Build successful"
        docker image ls lamacheref/openindexv2  # Liste images locales
