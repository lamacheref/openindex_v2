name: Docker Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build image
      id: build
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64
        push: false
        tags: lamacheref/openindexv2:local
        cache-from: type=gha
        cache-to: type=gha,mode=max
        outputs: type=image,name=image_id,push=false

    - name: Inspect image
      run: docker image inspect ${{ steps.build.outputs.image_id }} | jq '.[0].Config.Cmd'

    - name: Test image
      run: |
        docker run --rm ${{ steps.build.outputs.image_id }} \
          sh -c 'echo "✅ Build successful" && 
                 echo "Node: $(node --version || echo "N/A")" &&
                 echo "NPM:  $(npm --version  || echo "N/A")"'
