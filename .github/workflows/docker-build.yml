name: Docker Build and Publish

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: web
            dockerfile: docker/web.Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/openindex_v2-web
            test_cmd: "node --version && npm --version"
          - service: crawler
            dockerfile: docker/crawler.Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/openindex_v2-crawler
            test_cmd: "python --version"

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: meta
        run: |
          echo "sha_tag=${{ matrix.image }}:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "latest_tag=${{ matrix.image }}:latest" >> $GITHUB_OUTPUT

      - name: Build image (PR)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push image (main)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          load: true
          push: true
          tags: |
            ${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Inspect image
        run: docker image inspect ${{ steps.meta.outputs.sha_tag }} | jq '.[0].Config.Cmd'

      - name: Test image
        run: docker run --rm ${{ steps.meta.outputs.sha_tag }} sh -c "${{ matrix.test_cmd }}"
