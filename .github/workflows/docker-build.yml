name: Docker Build and Publish

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      crawler: ${{ steps.filter.outputs.crawler }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect service changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'docker/web.Dockerfile'
              - 'server.js'
              - 'package.json'
              - 'package-lock.json'
              - 'ui/**'
            crawler:
              - 'docker/crawler.Dockerfile'
              - 'src/**'
              - 'sql/**'

  build-web:
    needs: detect-changes
    if: needs.detect-changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: meta
        run: |
          echo "sha_tag=ghcr.io/${{ github.repository_owner }}/openindex_v2-web:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "latest_tag=ghcr.io/${{ github.repository_owner }}/openindex_v2-web:latest" >> $GITHUB_OUTPUT

      - name: Build image (PR)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web.Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push image (main)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web.Dockerfile
          platforms: linux/amd64
          load: true
          push: true
          tags: |
            ${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Inspect image
        run: docker image inspect ${{ steps.meta.outputs.sha_tag }} | jq '.[0].Config.Cmd'

      - name: Test image
        run: docker run --rm ${{ steps.meta.outputs.sha_tag }} sh -c "node --version && npm --version"

  build-crawler:
    needs: detect-changes
    if: needs.detect-changes.outputs.crawler == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: meta
        run: |
          echo "sha_tag=ghcr.io/${{ github.repository_owner }}/openindex_v2-crawler:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "latest_tag=ghcr.io/${{ github.repository_owner }}/openindex_v2-crawler:latest" >> $GITHUB_OUTPUT

      - name: Build image (PR)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/crawler.Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push image (main)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/crawler.Dockerfile
          platforms: linux/amd64
          load: true
          push: true
          tags: |
            ${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Inspect image
        run: docker image inspect ${{ steps.meta.outputs.sha_tag }} | jq '.[0].Config.Cmd'

      - name: Test image
        run: docker run --rm ${{ steps.meta.outputs.sha_tag }} sh -c "python --version"
